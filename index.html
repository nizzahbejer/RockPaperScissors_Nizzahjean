<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- RED FLASH -->
  <div id="flash"></div>

  <div class="container">

    <h1>✊ Rock Paper Scissors ✋</h1>

    <!-- EMOJI DISPLAY -->
    <div id="emoji-display">❓ vs ❓</div>

    <!-- BUTTONS -->
    <div class="buttons">
      <button data-choice="rock">✊ Rock</button>
      <button data-choice="paper">📄 Paper</button>
      <button data-choice="scissors">✂️ Scissors</button>
    </div>

    <!-- RESULT -->
    <div class="result">
      <p id="player-choice">You chose: -</p>
      <p id="computer-choice">Computer chose: -</p>

      <h2 id="result-text">Make your move!</h2>
    </div>

    <!-- SCORE -->
    <div class="score">
      <p>Wins: <span id="wins">0</span></p>
      <p>Losses: <span id="losses">0</span></p>
      <p>Ties: <span id="ties">0</span></p>
    </div>

    <!-- RESET -->
    <button id="reset">Reset Score</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
